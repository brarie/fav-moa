services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: moa-postgres
    environment:
      POSTGRES_USER: moa
      POSTGRES_PASSWORD: moa
      POSTGRES_DB: moa
    ports:
      - "5432:5432"
    volumes:
      - moa-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moa -d moa"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: moa-redis
    ports:
      - "6379:6379"

volumes:
  moa-pgdata:

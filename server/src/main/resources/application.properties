spring.application.name=server

# --- Datasource (dev: docker compose의 postgres) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/moa}
spring.datasource.username=${DB_USER:moa}
spring.datasource.password=${DB_PASSWORD:moa}

# --- JPA: 스키마는 Flyway가 관리, Hibernate는 검증만 ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# --- Redis (dev: docker compose) ---
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
